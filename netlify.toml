# This file is in the repository root
[build]
  base = "SoWhatAI"
  command = "npm install --legacy-peer-deps --no-audit --no-fund && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."wcag-scan"]
  external_node_modules = ["playwright-core", "@sparticuz/chromium", "axe-core"]

[functions."run-wcag-scan"]
  external_node_modules = ["playwright-core", "@sparticuz/chromium", "axe-core", "@supabase/supabase-js"]

[functions."run-wcag-scan-background"]
  external_node_modules = ["playwright-core", "@sparticuz/chromium", "axe-core", "@supabase/supabase-js"]

[functions.wcag-start]
  external_node_modules = ["@supabase/supabase-js"]

[functions.wcag-status]
  external_node_modules = ["@supabase/supabase-js"]

[functions."capture-page"]
  external_node_modules = ["@netlify/blobs"]

[functions."analyze-snapshot"]
  external_node_modules = ["@netlify/blobs"]

[functions."analyze-snapshot-background"]
  external_node_modules = ["axe-core", "jsdom", "@netlify/blobs"]

[functions."snapshot-status"]
  external_node_modules = ["@netlify/blobs"]

[[redirects]]
  from = "/wcag-scan"
  to = "/index.html"
  status = 200
